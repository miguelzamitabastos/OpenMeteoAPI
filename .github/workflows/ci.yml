name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check Prettier formatting
        run: npm run format:check

  typecheck:
    name: Type Check (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run typecheck

  test-unit:
    name: Unit Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: typecheck
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:unit

      - name: Upload unit JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-unit-node-${{ matrix.node-version }}
          path: reports/junit/junit.xml

      - name: Upload unit coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit-node-${{ matrix.node-version }}
          path: coverage/unit

  test-integration:
    name: Integration Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: test-unit
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests with coverage
        run: npm run test:integration

      - name: Upload integration JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-integration-node-${{ matrix.node-version }}
          path: reports/junit/junit.xml

      - name: Upload integration coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration-node-${{ matrix.node-version }}
          path: coverage/integration

  test-mocks:
    name: Mock Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: test-integration
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-

      - name: Install dependencies
        run: npm ci

      - name: Run mock tests with coverage
        run: npm run test:mocks

      - name: Upload mock JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-mocks-node-${{ matrix.node-version }}
          path: reports/junit/junit.xml

      - name: Upload mock coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-mocks-node-${{ matrix.node-version }}
          path: coverage/mocks

  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: test-mocks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: coverage-artifacts
          merge-multiple: true

      - name: Merge coverage files
        run: |
          mkdir -p coverage-temp coverage/merged
          find coverage-artifacts -name "coverage-final.json" -exec cp {} coverage-temp/ \;
          npx --yes nyc@17.1.0 merge coverage-temp coverage-temp/coverage-final.json
          npx --yes nyc@17.1.0 report \
            --temp-dir coverage-temp \
            --report-dir coverage/merged \
            --reporter=lcov \
            --reporter=text-summary \
            --reporter=json-summary

      - name: Upload merged coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-merged
          path: coverage/merged

      - name: Build coverage summary markdown
        id: coverage-summary
        run: |
          node -e "
          const fs = require('fs');
          const summaryPath = 'coverage/merged/coverage-summary.json';
          const summary = JSON.parse(fs.readFileSync(summaryPath, 'utf8'));
          const total = summary.total;
          const fmt = (v) => Number(v).toFixed(2);
          const text = [
            '## Coverage Summary',
            '',
            '| Metric | Value | Threshold |',
            '| --- | ---: | ---: |',
            '| Lines | ' + fmt(total.lines.pct) + '% | 80% |',
            '| Branches | ' + fmt(total.branches.pct) + '% | 75% |',
            '| Functions | ' + fmt(total.functions.pct) + '% | 85% |',
            '',
            '_Generated by CI coverage-report job._'
          ].join('\n');
          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'markdown<<EOF\n' + text + '\nEOF\n');
          "

      - name: Comment coverage summary on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          message: ${{ steps.coverage-summary.outputs.markdown }}

  build:
    name: Build (Node 20.x)
    runs-on: ubuntu-latest
    needs: coverage-report

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-20.x-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-20.x-

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build
